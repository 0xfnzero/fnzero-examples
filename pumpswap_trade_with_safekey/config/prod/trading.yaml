# =========================
# 交易配置（生产环境，与 copy-bot config/prod/trading.yaml 一致）
# =========================

# 滑点与每笔买入金额、持仓时间
buy_slippage_bps: 500
sell_slippage_bps: 9980
buy_sol_amount: 0.01
hold_seconds: 20

# 小费策略开关
enable_high_low_fee: false

# Gas Fee：优先费(CU 价格) + 给 SWQoS 的小费(SOL)，买入/卖出可分别配置
gas_fee:
  # ---------- 全局单一费率（enable_high_low_fee=false 时使用）----------
  # CU 上限需足够大，否则会报 Computational budget exceeded（PumpSwap 买入/卖出建议 ≥200000）
  global_buy_cu_limit: 250000
  global_buy_cu_price: 1286883
  global_buy_tip: 0.0001
  global_sell_cu_limit: 250000
  global_sell_cu_price: 600000
  global_sell_tip: 0.0001
  cu_limit: 250000

  # ---------- 高低两档（enable_high_low_fee=true 时使用）----------
  low_tip_high_cu_price: 400000
  low_buy_tip: 0.00001
  low_sell_tip: 0.00001
  high_tip_low_cu_price: 180000
  high_buy_tip: 0.003
  high_sell_tip: 0.001

  # ---------- 账户数据大小限制（0=不添加此指令）----------
  buy_data_size_limit: 0
  sell_data_size_limit: 0

  # ---------- 动态小费 / 动态优先费（按买入金额比例，有上限）----------
  enable_dynamic_tip: false
  dynamic_tip_percentage: 0.3
  enable_dynamic_cu_price: false
  dynamic_cu_price_percentage: 0.05
  dynamic_cu_price_max: 50000000

  # ---------- 按金额阈值递增的小费 ----------
  # 买入：当「触发条件金额」超过阈值时，按每 SOL 增加小费，有封顶
  buy_tip_increment_threshold_sol: 0.0
  buy_tip_increment_per_sol: 0.0
  buy_tip_increment_max: 0.0
  # 卖出：同上逻辑
  sell_tip_increment_threshold_sol: 0.0
  sell_tip_increment_per_sol: 0.00001
  sell_tip_increment_max: 0.0001
