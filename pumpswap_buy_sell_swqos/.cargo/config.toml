# ========================================
# 🚀 Cargo 构建配置
# ========================================

[build]
# 使用自定义目标目录（避免污染源码目录）
target-dir = "build-cache"
# 并行任务数默认=CPU 核心数；要更快可设环境变量 CARGO_BUILD_JOBS=16

# ========================================
# 🎯 裸机服务器 CPU 特定优化
# ========================================

# 使用 RUSTFLAGS 环境变量来配置编译优化
# 注意：这些配置会影响所有依赖库的编译

# 示例1: 针对当前CPU优化（裸机推荐）
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "target-cpu=native"]

# 示例2: 针对特定CPU架构（便携模式）
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "target-cpu=x86-64-v3"]

# ========================================
# 📝 CPU 架构说明
# ========================================
# 
# target-cpu 可选值：
# 
# 1. native (裸机推荐) ⭐
#    - 根据编译机器的CPU自动启用所有支持的指令集
#    - 性能最优，但二进制文件只能在相同或更新的CPU上运行
#    - 适用场景：编译服务器和运行服务器CPU相同
# 
# 2. x86-64-v3 (推荐) ⭐⭐⭐
#    - AVX2, BMI2, FMA, LZCNT, MOVBE 等指令集
#    - 兼容 2015年后的大部分Intel/AMD CPU
#    - 平衡性能和兼容性的最佳选择
# 
# 3. x86-64-v2
#    - SSE4.2, POPCNT 等指令集
#    - 兼容 2008年后的CPU
#    - 较好兼容性，性能提升有限
# 
# 4. x86-64 (基准)
#    - 最基础的x86-64指令集
#    - 最大兼容性，性能最低
# 
# ========================================
# 🔧 如何选择编译模式？
# ========================================
#
# 方案A: 使用部署脚本自动配置（推荐）
#   ./build-for-baremetal.sh --mode=native
#   ./build-for-baremetal.sh --mode=v3
#
# 方案B: 手动配置
#   取消下方对应配置的注释即可
#
# ========================================

# ========================================
# 🐧 macOS 交叉编译到 Linux 配置
# ========================================
[target.x86_64-unknown-linux-gnu]
# 指定 Linux 交叉编译链接器
# 安装方法: brew install messense/macos-cross-toolchains/x86_64-unknown-linux-gnu
linker = "x86_64-unknown-linux-gnu-gcc"
rustflags = [
    # 使用 x86-64-v3 级别（支持 AVX2, 兼容大部分现代服务器）
    "-C", "target-cpu=x86-64-v3",
    # 最高优化级别
    "-C", "opt-level=3",
]

# ========================================

# 配置示例（默认注释，由脚本动态配置）

# 裸机极限性能模式（编译和运行在同一台服务器）
# [target.x86_64-unknown-linux-gnu]
# rustflags = [
#     "-C", "target-cpu=native",        # 使用当前CPU的所有特性
#     "-C", "target-feature=+avx2",     # 强制启用AVX2
#     "-C", "opt-level=3",              # 最高优化级别
# ]

# 便携性能模式（可在多台服务器间迁移）
# [target.x86_64-unknown-linux-gnu]
# rustflags = [
#     "-C", "target-cpu=x86-64-v3",     # AVX2等现代指令集
#     "-C", "opt-level=3",              # 最高优化级别
# ]

# ========================================
# 📊 性能对比参考
# ========================================
# 
# 编译模式对比（相对基准 x86-64）：
# 
# | 模式      | 编译时间 | 运行性能 | 兼容性 | 推荐场景 |
# |-----------|----------|----------|--------|----------|
# | native    | +30%     | +15-25%  | 低     | 裸机专用 |
# | x86-64-v3 | +20%     | +10-15%  | 中     | 生产推荐 |
# | x86-64-v2 | +10%     | +5-8%    | 高     | 老CPU    |
# | x86-64    | 基准     | 基准     | 最高   | 兼容模式 |
# 
# ========================================
